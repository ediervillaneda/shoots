name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pygame-ce pytest

      - name: Run tests
        run: python -m pytest -q

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pygame-ce pyinstaller

      - name: Build
        run: pyinstaller Starfall.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starfall-windows
          path: dist/Starfall.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pygame-ce pyinstaller

      - name: Build
        run: pyinstaller Starfall.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Starfall-linux
          path: dist/Starfall

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: Starfall-windows
          path: artifacts/windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: Starfall-linux
          path: artifacts/linux

      - name: Set permissions on Linux binary
        run: chmod +x artifacts/linux/Starfall

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/Starfall.exe
            artifacts/linux/Starfall
          generate_release_notes: true
